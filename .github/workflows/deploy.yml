name: Deploy FAQs Web

on:
    push:
        branches:
            - main

jobs:
    build-and-push:
        name: Build & Push Docker Image
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Tencent Cloud TCR
              uses: docker/login-action@v3
              with:
                  registry: ccr.ccs.tencentyun.com
                  username: ${{ secrets.TCR_USERNAME }}
                  password: ${{ secrets.TCR_PASSWORD }}

            - name: Extract image metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ccr.ccs.tencentyun.com/jianghr/faqs-web
                  tags: |
                      type=sha,prefix=sha-,format=short
                      type=raw,value=latest,enable={{is_default_branch}}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
                      NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
                      NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    deploy:
        name: Deploy to Server
        runs-on: ubuntu-latest
        needs: build-and-push
        steps:
            - name: Compute image tag
              id: img
              run: |
                  SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
                  echo "tag=sha-${SHA_SHORT}" >> $GITHUB_OUTPUT

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: root
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  script: |
                      docker login ccr.ccs.tencentyun.com --username=${{ secrets.TCR_USERNAME }} --password='${{ secrets.TCR_PASSWORD }}'

                      docker pull ccr.ccs.tencentyun.com/jianghr/faqs-web:${{ steps.img.outputs.tag }}

                      docker stop faqs-web 2>/dev/null || true
                      docker rm   faqs-web 2>/dev/null || true

                      docker run -d \
                        --name faqs-web \
                        --restart unless-stopped \
                        -p 3001:3000 \
                        -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
                        -e DIRECT_URL='${{ secrets.DIRECT_URL }}' \
                        -e NEXT_PUBLIC_SUPABASE_URL='${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}' \
                        -e NEXT_PUBLIC_SUPABASE_ANON_KEY='${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}' \
                        -e API_BASE_URL='${{ secrets.API_BASE_URL }}' \
                        -e NEXT_PUBLIC_APP_URL='${{ secrets.NEXT_PUBLIC_APP_URL }}' \
                        -e APP_ORIGIN='${{ secrets.APP_ORIGIN }}' \
                        -e FINNHUB_API_KEY='${{ secrets.FINNHUB_API_KEY }}' \
                        -e CRON_SECRET='${{ secrets.CRON_SECRET }}' \
                        -e OPENAI_API_KEY='${{ secrets.OPENAI_API_KEY }}' \
                        -e OPENAI_BASE_URL='${{ secrets.OPENAI_BASE_URL }}' \
                        -e OPENAI_MODEL='${{ secrets.OPENAI_MODEL }}' \
                        -e TAVILY_API_KEY='${{ secrets.TAVILY_API_KEY }}' \
                        -e TAVILY_ALLOWED_DOMAINS='${{ secrets.TAVILY_ALLOWED_DOMAINS }}' \
                        -e TAVILY_CACHE_TTL_SECONDS='${{ secrets.TAVILY_CACHE_TTL_SECONDS || 1800 }}' \
                        -e TAVILY_MAX_RESULTS='${{ secrets.TAVILY_MAX_RESULTS || 5 }}' \
                        ccr.ccs.tencentyun.com/jianghr/faqs-web:${{ steps.img.outputs.tag }}

                      docker image prune -f

                      # 设置 cron 定时采集新闻（每分钟，内部 scheduler 控制实际频率）
                      CRON_CMD='* * * * * curl -s -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" http://localhost:3001/api/news/cron > /dev/null 2>&1'
                      (crontab -l 2>/dev/null | grep -v '/api/news/cron'; echo "$CRON_CMD") | crontab -
